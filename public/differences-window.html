<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Différences - Orga PRO</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin:0; padding:16px; background:#f5f7fb; color:#222 }
    .header { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:12px }
    h1 { font-size:18px; margin:0 }
    .controls { display:flex; gap:8px }
    .btn { padding:8px 12px; border-radius:6px; border:1px solid #ccc; background:#fff; cursor:pointer }
    .btn-primary { background:#2b6cb0; color:white; border-color:#2b6cb0 }
    .summary { margin:12px 0; display:flex; gap:12px }
    .changes { margin-top:12px; display:flex; flex-direction:column; gap:8px; max-height:70vh; overflow:auto }
    .change { background:white; padding:10px; border-radius:6px; border-left:4px solid #ccc; display:flex; gap:10px; align-items:flex-start }
    .change.added { border-left-color:#38a169 }
    .change.removed { border-left-color:#e53e3e }
    .change.modified { border-left-color:#dd6b20 }
    .change h3 { margin:0; font-size:14px }
    .mods { margin-top:6px; font-size:13px; color:#444 }
    .footer { margin-top:12px; display:flex; justify-content:flex-end; gap:8px }
    .count-badge { background:#e2e8f0; padding:6px 10px; border-radius:999px; font-weight:700 }
  </style>
</head>
<body>
  <div class="header">
    <h1>Différences détectées</h1>
    <div class="controls">
      <button id="selectAll" class="btn">Tout accepter</button>
      <button id="deselectAll" class="btn">Rien accepter</button>
      <span id="totalCount" class="count-badge">0</span>
    </div>
  </div>

  <div id="summary" class="summary"></div>
  <div id="changes" class="changes"></div>

  <div class="footer">
    <button id="cancelBtn" class="btn">Annuler</button>
    <button id="applyBtn" class="btn btn-primary">Appliquer</button>
  </div>

  <script>
    (async function(){
      console.log('[DiffsWindow] 🔍 Démarrage fenêtre différences');
      
      const get = window.electronAPI && window.electronAPI.getDifferencesData;
      if (!get) {
        console.error('[DiffsWindow] ❌ API Electron non disponible');
        document.body.innerHTML = '<p>API Electron non disponible.</p>';
        return;
      }

      const diffs = await window.electronAPI.getDifferencesData();
      console.log('[DiffsWindow] 📥 Données reçues:', JSON.stringify(diffs, null, 2));
      
      if (!diffs) {
        console.warn('[DiffsWindow] ⚠️ diffs est null/undefined');
        document.body.innerHTML = '<p>Aucune différence à afficher.</p>';
        return;
      }

      console.log('[DiffsWindow] 📊 Résumé:', diffs.summary);

      // Si aucune différence au total, afficher un message explicite puis quitter
      if (diffs.summary && ((diffs.summary.total || 0) === 0)) {
        console.log('[DiffsWindow] ℹ️ Aucune différence détectée - affichage message');
        document.body.innerHTML = `
          <div style="display:flex;align-items:center;justify-content:center;height:100vh;padding:24px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;">
            <div style="text-align:center;">
              <h2>Aucune différence détectée</h2>
              <p>Le fichier Excel correspond aux données actuelles. Aucune mise à jour nécessaire.</p>
              <div style="margin-top:12px;"><button onclick="window.close()" class="btn">Fermer</button></div>
            </div>
          </div>
        `;
        return;
      }

      const changesContainer = document.getElementById('changes');
      const summaryEl = document.getElementById('summary');
      const totalCountEl = document.getElementById('totalCount');

      const all = [];
      diffs.added.forEach((c, i) => all.push({ ...c, _id: `added_${i}` }));
      diffs.removed.forEach((c, i) => all.push({ ...c, _id: `removed_${i}` }));
      diffs.modified.forEach((c, i) => all.push({ ...c, _id: `modified_${i}` }));

      totalCountEl.textContent = diffs.summary.total || all.length;

      // summary
      summaryEl.innerHTML = `
        <div>Ajoutés: <strong>${diffs.summary.totalAdded}</strong></div>
        <div>Supprimés: <strong>${diffs.summary.totalRemoved}</strong></div>
        <div>Modifiés: <strong>${diffs.summary.totalModified}</strong></div>
      `;

      const selection = new Set();

      function render() {
        changesContainer.innerHTML = '';
        all.forEach(item => {
          const div = document.createElement('div');
          div.className = 'change ' + (item.type || '');

          const checkbox = document.createElement('input');
          checkbox.type = 'checkbox';
          checkbox.checked = selection.has(item._id);
          checkbox.addEventListener('change', () => {
            if (checkbox.checked) selection.add(item._id); else selection.delete(item._id);
          });

          const content = document.createElement('div');
          content.style.flex = '1';

          const title = document.createElement('h3');
          if (item.type === 'added') {
            const c = item.excelContact || item;
            title.textContent = `➕ ${c.firstName || ''} ${c.lastName || ''}`;
            const details = document.createElement('div'); details.className = 'mods';
            details.textContent = `${c.position || ''} ${c.department ? ' | ' + c.department : ''} ${c.email ? ' | ' + c.email : ''}`;
            content.appendChild(title); content.appendChild(details);
          } else if (item.type === 'removed') {
            const c = item.contact || item;
            title.textContent = `➖ ${c.firstName || ''} ${c.lastName || ''}`;
            const details = document.createElement('div'); details.className = 'mods';
            details.textContent = `${c.position || ''} ${c.department ? ' | ' + c.department : ''}`;
            content.appendChild(title); content.appendChild(details);
          } else if (item.type === 'modified') {
            const c = item.currentContact || {};
            title.textContent = `✏️ ${c.firstName || ''} ${c.lastName || ''}`;
            const details = document.createElement('div'); details.className = 'mods';
            details.innerHTML = item.modifications.map(m => `<div>${m.field}: "${m.oldValue}" → "${m.newValue}"</div>`).join('');
            content.appendChild(title); content.appendChild(details);
          }

          div.appendChild(checkbox);
          div.appendChild(content);
          changesContainer.appendChild(div);
        });
      }

      document.getElementById('selectAll').addEventListener('click', () => {
        all.forEach(i => selection.add(i._id)); render();
      });
      document.getElementById('deselectAll').addEventListener('click', () => {
        selection.clear(); render();
      });

      document.getElementById('cancelBtn').addEventListener('click', () => {
        window.close();
      });

      document.getElementById('applyBtn').addEventListener('click', async () => {
        console.log('[DiffsWindow] 🔍 Préparation des changements à appliquer');
        
        const accepted = all.filter(i => selection.has(i._id)).map(i => {
          console.log('[DiffsWindow] Traitement changement:', JSON.stringify(i, null, 2));
          
          // Structurer correctement le changement pour qu'App sache le traiter
          if (i.type === 'added') {
            const result = {
              type: 'added',
              excelContact: i.excelContact || i,
              key: i.key || `${(i.excelContact || i).firstName}|${(i.excelContact || i).lastName}`.toLowerCase()
            };
            console.log('[DiffsWindow] → Changement ADDED:', JSON.stringify(result));
            return result;
          }
          
          if (i.type === 'removed') {
            const c = i.contact || i;
            const result = {
              type: 'removed',
              key: i.key || `${c.firstName || ''}|${c.lastName || ''}`.toLowerCase(),
              contact: c
            };
            console.log('[DiffsWindow] → Changement REMOVED:', JSON.stringify(result));
            return result;
          }
          
          if (i.type === 'modified') {
            const result = {
              type: 'modified',
              key: i.key || (i.currentContact && `${i.currentContact.firstName}|${i.currentContact.lastName}`.toLowerCase()),
              currentContact: i.currentContact,
              modifications: i.modifications || []
            };
            console.log('[DiffsWindow] → Changement MODIFIED:', JSON.stringify(result));
            return result;
          }
          
          console.warn('[DiffsWindow] ⚠️ Type inconnu:', i.type);
          return null;
        }).filter(Boolean);

        console.log('[DiffsWindow] 📤 Envoi de', accepted.length, 'changements');
        console.log('[DiffsWindow] Changements à envoyer:', JSON.stringify(accepted, null, 2));
        
        await window.electronAPI.applyDifferences(accepted);
        // main process will forward and close window
      });

      render();
    })();
  </script>
</body>
</html>

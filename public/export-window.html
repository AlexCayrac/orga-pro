<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exporter l'organigramme</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: #f5f5f5;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        .left-panel {
            flex: 0 0 320px;
            background: white;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 20px;
        }

        .header {
            margin-bottom: 20px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 12px;
        }

        .header h1 {
            color: #333;
            font-size: 18px;
            margin-bottom: 4px;
        }

        .header p {
            color: #666;
            font-size: 12px;
        }

        .form-section {
            margin-bottom: 18px;
        }

        .form-section h3 {
            color: #333;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group {
            margin-bottom: 10px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
            font-size: 13px;
        }

        .form-group select,
        .form-group input,
        .folder-selector {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 12px;
            color: #333;
            background-color: #fff;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .form-group select:focus,
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.1);
        }

        .folder-selector {
            display: flex;
            gap: 6px;
            padding: 0;
            border: none;
            background: none;
            cursor: default;
        }

        .folder-input {
            flex: 1;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 12px;
            background: white;
            color: #666;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .folder-btn {
            padding: 8px 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s ease;
        }

        .folder-btn:hover {
            background: #5568d3;
        }

        .radio-group {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }

        .radio-group label {
            display: flex;
            align-items: center;
            gap: 6px;
            margin: 0;
            cursor: pointer;
            font-weight: 400;
            font-size: 12px;
        }

        .radio-group input[type="radio"] {
            width: 14px;
            height: 14px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .buttons {
            display: flex;
            gap: 8px;
            margin-top: auto;
            padding-top: 15px;
            border-top: 1px solid #e0e0e0;
        }

        .btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-secondary {
            background-color: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background-color: #e0e0e0;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
            padding: 20px;
            overflow: hidden;
        }

        .preview-title {
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .preview-container {
            flex: 1;
            border: 1px solid #ddd;
            border-radius: 4px;
            overflow: auto;
            background: #fafafa;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .preview-paper {
            border: 2px dashed #333;
            background: white;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .preview-paper svg {
            max-width: 100%;
            max-height: 100%;
            display: block;
        }

        .preview-svg {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            padding: 20px;
        }

        .loading {
            text-align: center;
            color: #999;
            font-size: 13px;
        }

        .error {
            background-color: #fee;
            border: 1px solid #fcc;
            color: #c33;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
            display: none;
            font-size: 12px;
        }

        .error.show {
            display: block;
        }

        .exporting {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            display: none;
            z-index: 1000;
        }

        .exporting.show {
            display: block;
        }

        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="left-panel">
            <div class="header">
                <h1>📤 Exporter</h1>
                <p>Configurez vos paramètres</p>
            </div>

            <div class="error" id="error"></div>

            <form id="exportForm">
                <!-- Format -->
                <div class="form-section">
                    <h3>📋 Format</h3>
                    <div class="form-group">
                        <select id="format">
                            <option value="PNG">PNG (Raster)</option>
                            <option value="JPEG">JPEG (Compressé)</option>
                            <option value="SVG">SVG (Vecteur)</option>
                            <option value="PDF">PDF (Document)</option>
                        </select>
                    </div>
                </div>

                <!-- Feuille -->
                <div class="form-section">
                    <h3>📄 Feuille</h3>
                    <div class="form-group">
                        <select id="paperSize">
                            <option value="A6">A6 (105×148mm)</option>
                            <option value="A5">A5 (148×210mm)</option>
                            <option value="A4" selected>A4 (210×297mm)</option>
                            <option value="A3">A3 (297×420mm)</option>
                            <option value="A2">A2 (420×594mm)</option>
                            <option value="A1">A1 (594×841mm)</option>
                            <option value="A0">A0 (841×1189mm)</option>
                            <option value="Letter">Letter (215.9×279.4mm)</option>
                            <option value="Tabloid">Tabloid (279.4×431.8mm)</option>
                            <option value="Custom">Personnalisé</option>
                        </select>
                    </div>

                    <div class="form-group" id="customSizeGroup" style="display: none;">
                        <label>Largeur (mm):</label>
                        <input type="number" id="customWidth" min="50" max="2000" placeholder="L">
                    </div>

                    <div class="form-group" id="customHeightGroup" style="display: none;">
                        <label>Hauteur (mm):</label>
                        <input type="number" id="customHeight" min="50" max="2000" placeholder="H">
                    </div>
                </div>

                <!-- Orientation -->
                <div class="form-section">
                    <h3>📐 Orientation</h3>
                    <div class="radio-group">
                        <label>
                            <input type="radio" name="orientation" value="portrait" checked>
                            Portrait
                        </label>
                        <label>
                            <input type="radio" name="orientation" value="landscape">
                            Paysage
                        </label>
                    </div>
                </div>

                <!-- Positionnement -->
                <div class="form-section">
                    <h3>📍 Positionnement</h3>
                    <div class="radio-group">
                        <label>
                            <input type="radio" name="alignment" value="center" checked>
                            Centré
                        </label>
                        <label>
                            <input type="radio" name="alignment" value="left">
                            Gauche
                        </label>
                        <label>
                            <input type="radio" name="alignment" value="right">
                            Droite
                        </label>
                    </div>
                </div>

                <!-- Dossier -->
                <div class="form-section">
                    <h3>📁 Dossier</h3>
                    <div class="form-group">
                        <div class="folder-selector">
                            <div class="folder-input" id="folderPath" title="Téléchargements/Orga PRO Exports">
                                📥 Défaut
                            </div>
                            <button type="button" class="folder-btn" id="selectFolderBtn">Parcourir</button>
                        </div>
                    </div>
                </div>

                <!-- Boutons -->
                <div class="buttons">
                    <button type="button" class="btn btn-secondary" id="cancelBtn">Annuler</button>
                    <button type="submit" class="btn btn-primary" id="exportBtn">Exporter</button>
                </div>
            </form>
        </div>

        <div class="right-panel">
            <div class="preview-title">👁️ Aperçu</div>
            <div class="preview-container" id="previewContainer">
                <div class="loading">Chargement du SVG...</div>
            </div>
            <div class="exporting" id="exporting">
                <div class="spinner"></div>
                <p>Export en cours...</p>
            </div>
        </div>
    </div>

    <script>
        const paperSizes = {
            A6: { width: 105, height: 148 },
            A5: { width: 148, height: 210 },
            A4: { width: 210, height: 297 },
            A3: { width: 297, height: 420 },
            A2: { width: 420, height: 594 },
            A1: { width: 594, height: 841 },
            A0: { width: 841, height: 1189 },
            Letter: { width: 215.9, height: 279.4 },
            Tabloid: { width: 279.4, height: 431.8 }
        };

        const formatSelect = document.getElementById('format');
        const paperSizeSelect = document.getElementById('paperSize');
        const orientationRadios = document.querySelectorAll('input[name="orientation"]');
        const customSizeGroup = document.getElementById('customSizeGroup');
        const customHeightGroup = document.getElementById('customHeightGroup');
        const customWidthInput = document.getElementById('customWidth');
        const customHeightInput = document.getElementById('customHeight');
        const form = document.getElementById('exportForm');
        const cancelBtn = document.getElementById('cancelBtn');
        const selectFolderBtn = document.getElementById('selectFolderBtn');
        const folderPath = document.getElementById('folderPath');
        const errorDiv = document.getElementById('error');
        const previewContainer = document.getElementById('previewContainer');
        const exportingDiv = document.getElementById('exporting');

        let selectedFolder = null;
        let svgContent = null;

        // Charger le SVG au démarrage avec délai pour attendre le preload
        async function initializeSvg() {
            try {
                console.log('[EXPORT-WINDOW] Tentative de chargement SVG...');
                
                // Vérifier que l'API est disponible
                if (!window.electronAPI) {
                    console.log('[EXPORT-WINDOW] 🔄 electronAPI non encore disponible, attente...');
                    setTimeout(initializeSvg, 200); // Attendre plus longtemps
                    return;
                }
                
                if (!window.electronAPI.getSvgData) {
                    console.log('[EXPORT-WINDOW] 🔄 getSvgData non disponible, attente...');
                    setTimeout(initializeSvg, 200);
                    return;
                }
                
                console.log('[EXPORT-WINDOW] ✅ API disponible, appel getSvgData...');
                const result = await window.electronAPI.getSvgData();
                console.log('[EXPORT-WINDOW] 📦 Résultat getSvgData:', {
                    hasSvgContent: result && !!result.svgContent,
                    hasError: result && !!result.error,
                    contentLength: result && result.svgContent ? result.svgContent.length : 0,
                    error: result && result.error
                });
                
                if (result && result.svgContent && result.svgContent.length > 0) {
                    svgContent = result.svgContent;
                    displaySvgPreview();
                    console.log('[EXPORT-WINDOW] ✅ SVG chargé avec succès');
                } else if (result && result.error) {
                    console.error('[EXPORT-WINDOW] ❌ Erreur SVG:', result.error);
                    showError(result.error);
                } else {
                    console.warn('[EXPORT-WINDOW] ⚠️ Pas de SVG content reçu, réessai...');
                    setTimeout(initializeSvg, 300);
                }
            } catch (err) {
                console.error('[EXPORT-WINDOW] ❌ Exception chargement SVG:', err);
                showError('Erreur: ' + err.message);
            }
        }

        // Initialiser immédiatement et aussi au chargement
        console.log('[EXPORT-WINDOW] 🚀 Script chargé, tentative chargement SVG...');
        initializeSvg();
        
        // Aussi au chargement de la page
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initializeSvg);
        } else {
            // Page déjà chargée
            setTimeout(initializeSvg, 300);
        }
        
        // Fallback avec une tentative plus tardive
        setTimeout(() => {
            if (!svgContent) {
                console.log('[EXPORT-WINDOW] ⚠️ SVG non chargé après 2s, nouvelle tentative...');
                initializeSvg();
            }
        }, 2000);

        // Afficher l'aperçu SVG avec gestion de l'orientation
        function displaySvgPreview() {
            if (!svgContent) {
                console.warn('[EXPORT-WINDOW] Pas de contenu SVG');
                showError('Aucun contenu SVG à afficher');
                return;
            }
            
            try {
                previewContainer.innerHTML = '';
                
                // Parser le SVG
                const parser = new DOMParser();
                const doc = parser.parseFromString(svgContent, 'image/svg+xml');
                
                // Vérifier les erreurs de parsing
                if (doc.getElementsByTagName('parsererror').length > 0) {
                    console.error('[EXPORT-WINDOW] Erreur parsing SVG');
                    showError('SVG invalide');
                    return;
                }
                
                const svgElement = doc.documentElement;
                // Appliquer l'orientation au preview aussi
                const orientation = document.querySelector('input[name="orientation"]:checked').value;
                
                // Gérer l'orientation du SVG
                const viewBoxAttr = svgElement.getAttribute('viewBox');
                let width = svgElement.getAttribute('width');
                let height = svgElement.getAttribute('height');
                
                if (width && height) {
                    const w = parseFloat(width);
                    const h = parseFloat(height);
                    
                    if (orientation === 'landscape' && w < h) {
                        // Inverser pour paysage
                        svgElement.setAttribute('width', h);
                        svgElement.setAttribute('height', w);
                        if (viewBoxAttr) {
                            const vbParts = viewBoxAttr.split(' ');
                            svgElement.setAttribute('viewBox', `${vbParts[0]} ${vbParts[1]} ${vbParts[3]} ${vbParts[2]}`);
                        }
                    } else if (orientation === 'portrait' && w > h) {
                        // Inverser pour portrait
                        svgElement.setAttribute('width', h);
                        svgElement.setAttribute('height', w);
                        if (viewBoxAttr) {
                            const vbParts = viewBoxAttr.split(' ');
                            svgElement.setAttribute('viewBox', `${vbParts[0]} ${vbParts[1]} ${vbParts[3]} ${vbParts[2]}`);
                        }
                    }
                }
                
                svgElement.setAttribute('style', 'width: 100%; height: 100%; display: block;');
                
                // Créer un conteneur pour la feuille avec le contour
                const paperElement = document.createElement('div');
                paperElement.className = 'preview-paper';
                paperElement.appendChild(svgElement);
                
                previewContainer.appendChild(paperElement);
                
                // Appliquer le zoom automatique
                setTimeout(autoScalePreview, 100);
                
                console.log('[EXPORT-WINDOW] ✅ Aperçu SVG affiché avec orientation:', orientation);
            } catch (err) {
                console.error('[EXPORT-WINDOW] Erreur affichage SVG:', err);
                showError('Erreur: ' + err.message);
            }
        }

        // Fonction pour calculer et appliquer le zoom automatique
        function autoScalePreview() {
            const paperElement = previewContainer.querySelector('.preview-paper');
            if (!paperElement || previewContainer.offsetWidth === 0) return;
            
            // Récupérer la taille de papier
            const paperSize = paperSizeSelect.value;
            const orientation = document.querySelector('input[name="orientation"]:checked').value;
            
            let paperWidth = 210, paperHeight = 297; // A4 par défaut en mm
            
            if (paperSize === 'Custom') {
                paperWidth = parseFloat(customWidthInput.value);
                paperHeight = parseFloat(customHeightInput.value);
            } else if (paperSizes[paperSize]) {
                paperWidth = paperSizes[paperSize].width;
                paperHeight = paperSizes[paperSize].height;
            }
            
            // Inverser pour paysage
            if (orientation === 'landscape') {
                [paperWidth, paperHeight] = [paperHeight, paperWidth];
            }
            
            // Calculer le ratio: 96 pixels = 25.4mm (standard DPI)
            const pixelsPerMm = 96 / 25.4;
            const paperPixelWidth = paperWidth * pixelsPerMm;
            const paperPixelHeight = paperHeight * pixelsPerMm;
            
            // Calculer le zoom pour que la feuille rentre dans le conteneur
            const containerWidth = previewContainer.offsetWidth - 40; // Marge
            const containerHeight = previewContainer.offsetHeight - 40;
            
            const zoomX = containerWidth / paperPixelWidth;
            const zoomY = containerHeight / paperPixelHeight;
            const zoom = Math.min(zoomX, zoomY, 1); // Max 100% pour éviter pixellisation
            
            // Appliquer les dimensions et le zoom
            paperElement.style.width = (paperPixelWidth * zoom) + 'px';
            paperElement.style.height = (paperPixelHeight * zoom) + 'px';
        }

        // Rafraîchir l'aperçu quand l'orientation change
        orientationRadios.forEach(radio => {
            radio.addEventListener('change', () => {
                if (svgContent) {
                    console.log('[EXPORT-WINDOW] 🔄 Orientation changée, rafraîchissement aperçu');
                    displaySvgPreview();
                    setTimeout(autoScalePreview, 100);
                }
            });
        });
        
        // Afficher/cacher les champs personnalisés ET rafraîchir quand le papier change
        paperSizeSelect.addEventListener('change', () => {
            if (paperSizeSelect.value === 'Custom') {
                customSizeGroup.style.display = 'block';
                customHeightGroup.style.display = 'block';
            } else {
                customSizeGroup.style.display = 'none';
                customHeightGroup.style.display = 'none';
            }
            // Rafraîchir l'aperçu
            if (svgContent) {
                setTimeout(autoScalePreview, 100);
            }
        });
        
        // Rafraîchir quand les dimensions custom changent
        customWidthInput?.addEventListener('change', () => {
            if (svgContent) {
                setTimeout(autoScalePreview, 100);
            }
        });
        customHeightInput?.addEventListener('change', () => {
            if (svgContent) {
                setTimeout(autoScalePreview, 100);
            }
        });

        // Sélectionner un dossier
        selectFolderBtn.addEventListener('click', async () => {
            try {
                const result = await window.electronAPI.selectFolder();
                if (result.folder) {
                    selectedFolder = result.folder;
                    const folderName = result.folder.split(/[/\\]/).pop();
                    folderPath.textContent = '📁 ' + folderName;
                    folderPath.title = result.folder;
                }
            } catch (err) {
                showError('Erreur lors de la sélection du dossier');
            }
        });

        // Bouton Annuler
        cancelBtn.addEventListener('click', () => {
            window.electronAPI.closeExportWindow();
        });

        // Soumettre le formulaire
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            errorDiv.classList.remove('show');
            exportingDiv.classList.add('show');

            const format = formatSelect.value;
            const orientation = document.querySelector('input[name="orientation"]:checked').value;
            const alignment = document.querySelector('input[name="alignment"]:checked').value;
            const paperSize = paperSizeSelect.value;
            
            let paperDimensions;
            if (paperSize === 'Custom') {
                const w = parseFloat(customWidthInput.value);
                const h = parseFloat(customHeightInput.value);
                if (!w || !h || w < 50 || h < 50) {
                    showError('Dimensions invalides (min 50mm)');
                    exportingDiv.classList.remove('show');
                    return;
                }
                paperDimensions = { width: w, height: h };
            } else {
                paperDimensions = paperSizes[paperSize];
            }

            try {
                const result = await window.electronAPI.confirmExport({
                    format,
                    orientation,
                    alignment,
                    paperSize,
                    paperDimensions,
                    folder: selectedFolder
                });

                if (result.error) {
                    showError(result.error);
                    exportingDiv.classList.remove('show');
                } else {
                    alert(`✅ Exporté!\n${result.message}`);
                    window.electronAPI.closeExportWindow();
                }
            } catch (err) {
                showError(err.message);
                exportingDiv.classList.remove('show');
            }
        });

        function showError(message) {
            errorDiv.textContent = '❌ ' + message;
            errorDiv.classList.add('show');
        }
    </script>
</body>
</html>
